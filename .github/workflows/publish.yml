name: Build and Publish Wheels

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on tags like v0.1.0

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Build wheels
        uses: pypa/cibuildwheel@v2
        env:
          # Only build for CPython 3.9 through 3.12 (standard current targets)
          CIBW_BUILD: cp39-* cp310-* cp311-* cp312-*
          # Skip PyPy and 32-bit builds
          CIBW_SKIP: pp* *-win32 *-manylinux_i686 *-musllinux*
          # Use manylinux_2_28 (AlmaLinux 8) instead of manylinux2014 (CentOS 7) for C++20 (GCC 12) support
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

      - uses: actions/upload-artifact@v5
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v5
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Optional: Set up trusted publishing
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
